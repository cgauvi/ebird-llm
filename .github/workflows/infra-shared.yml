name: Infrastructure (shared)

on:
  workflow_dispatch:
  push:
    branches: ["master", "main", "develop"]
    paths: ["infra/shared/**"]
  pull_request:
    branches: ["master", "main", "develop"]
    paths: ["infra/shared/**"]

# Only one operation against the shared stack at a time, regardless of branch.
concurrency:
  group: terraform-shared
  cancel-in-progress: false

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get AWS account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/shared
        run: |
          terraform init \
            -backend-config="bucket=ebird-llm-tf-state-${{ env.AWS_ACCOUNT_ID }}" \
            -backend-config="key=ebird-llm/shared/terraform.tfstate" \
            -backend-config="dynamodb_table=ebird-llm-tf-locks" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        id: plan
        working-directory: infra/shared
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan \
            -var "certificate_arn=${{ secrets.CERTIFICATE_ARN }}" 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: No changes planned
        if: steps.plan.outputs.exit_code == '0'
        run: |
          echo "## Terraform Plan — \`shared\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No changes. Infrastructure matches configuration — apply will be skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish plan to workflow summary
        if: steps.plan.outputs.exit_code != '0'
        working-directory: infra/shared
        run: |
          echo "## Terraform Plan — \`shared\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          cat plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const exitCode = process.env.EXIT_CODE;
            let comment;
            if (exitCode === '0') {
              comment = `## Terraform Plan — \`shared\`\n\nNo changes. Infrastructure matches configuration — apply will be skipped.`;
            } else {
              const raw  = fs.readFileSync('infra/shared/plan.txt', 'utf8');
              const body = raw.length > 60000
                ? raw.slice(0, 60000) + '\n\n_(truncated — see full plan in the workflow summary)_'
                : raw;
              comment = `## Terraform Plan — \`shared\`\n\`\`\`hcl\n${body}\n\`\`\``;
            }

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const prev = comments.find(c => c.body.startsWith('## Terraform Plan — `shared`'));
            if (prev) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: prev.id, body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body: comment,
              });
            }

      - name: Upload plan artifact
        if: steps.plan.outputs.exit_code != '1'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-shared-${{ github.sha }}
          path: infra/shared/tfplan
          retention-days: 7

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

  apply:
    name: Apply
    needs: plan
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.exit_code == '2'
    runs-on: ubuntu-latest

    # Reuses the same gated GitHub Environment as prod ("terraform-apply")
    # so any change to the shared VPC/ALB goes through manual review by
    # the same approvers.
    environment: terraform-apply

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get AWS account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-shared-${{ github.sha }}
          path: infra/shared/

      - name: Terraform init
        working-directory: infra/shared
        run: |
          terraform init \
            -backend-config="bucket=ebird-llm-tf-state-${{ env.AWS_ACCOUNT_ID }}" \
            -backend-config="key=ebird-llm/shared/terraform.tfstate" \
            -backend-config="dynamodb_table=ebird-llm-tf-locks" \
            -backend-config="encrypt=true"

      - name: Terraform apply saved plan
        working-directory: infra/shared
        run: terraform apply tfplan

      - name: Print shared ALB DNS name
        working-directory: infra/shared
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "Shared ALB DNS: $ALB_DNS"
          echo "## Shared ALB DNS" >> "$GITHUB_STEP_SUMMARY"
          echo "$ALB_DNS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Point each per-env hostname (e.g. \`ebird-llm-dev.charlesgauvin.ca\`, \`ebird-llm.charlesgauvin.ca\`) at this DNS name with a CNAME record." >> "$GITHUB_STEP_SUMMARY"
