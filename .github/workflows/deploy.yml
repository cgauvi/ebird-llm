name: Deploy

on:
  # Triggers only after Unit Tests pass on the deployment branches.
  # workflow_run fires regardless of the paths filter on the source workflow,
  # so we check whether the triggering run involved app/src changes by
  # inspecting the conclusion and relying on the test workflow's own paths
  # filter — if tests were skipped (no relevant files changed) this workflow
  # will not be triggered at all.
  workflow_run:
    workflows: ["Unit Tests"]
    branches: ["master", "main", "develop"]
    types: [completed]

# One live deployment per environment at a time.
# cancel-in-progress: false ensures we never abort a deploy already in flight.
concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    # Only run when the triggering test workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for OIDC token request
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the exact commit that triggered the upstream workflow_run
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # ── Determine environment from branch ─────────────────────────────────
      - name: Set deployment environment
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ "$BRANCH" == "master" || "$BRANCH" == "main" ]]; then
            echo "TF_ENV=prod" >> "$GITHUB_ENV"
          else
            echo "TF_ENV=dev"  >> "$GITHUB_ENV"
          fi
          # Use the short SHA as the image tag for traceability
          echo "IMAGE_TAG=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_ENV"
          # Human-readable version: tag if present (e.g. v1.2.3), otherwise tag+distance+sha
          echo "BUILD_VERSION=$(git describe --tags --always)" >> "$GITHUB_ENV"

      # ── AWS authentication (OIDC — no long-lived credentials stored) ───────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      # ── Build and push production Docker image to ECR ─────────────────────
      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          build-args: BUILD_VERSION=${{ env.BUILD_VERSION }}
          # Three tags per push:
          #   <sha>       — immutable, for traceability
          #   <env>-latest — env-scoped mutable pointer
          #   latest      — keeps Terraform's fallback image_tag resolvable
          tags: |
            ${{ steps.ecr_login.outputs.registry }}/ebird-llm-${{ env.TF_ENV }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr_login.outputs.registry }}/ebird-llm-${{ env.TF_ENV }}:${{ env.TF_ENV }}-latest
            ${{ steps.ecr_login.outputs.registry }}/ebird-llm-${{ env.TF_ENV }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── ECS deploy — update task definition with the new image ────────────
      # Infrastructure changes (cluster, VPC, IAM, …) are managed separately
      # in infra.yml.  This step only registers a new task-definition revision
      # with the updated image tag and points the service at it.
      #
      # Prerequisite: infra.yml must have run at least once to create the
      # ECS cluster and service before this step can succeed.
      - name: Update ECS task definition
        env:
          NEW_IMAGE: ${{ steps.ecr_login.outputs.registry }}/ebird-llm-${{ env.TF_ENV }}:${{ env.IMAGE_TAG }}
          CLUSTER: ebird-llm-${{ env.TF_ENV }}
          SERVICE: ebird-llm-${{ env.TF_ENV }}
        run: |
          # Read the active task definition and strip fields that are
          # rejected by register-task-definition (read-only metadata).
          NEW_DEF=$(aws ecs describe-task-definition \
            --task-definition "$CLUSTER" \
            --query 'taskDefinition' \
            --output json \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                      .compatibilities, .registeredAt, .registeredBy)
                  | .containerDefinitions[0].image = $ENV.NEW_IMAGE')

          # Register new revision with the updated image tag
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered task definition: $NEW_ARN"

          # Point the service at the new revision
          aws ecs update-service \
            --cluster  "$CLUSTER" \
            --service  "$SERVICE" \
            --task-definition "$NEW_ARN" \
            --region us-east-2

          echo "Deployed image: $NEW_IMAGE"

      - name: Print app URL
        run: |
          DNS=$(aws elbv2 describe-load-balancers \
            --names "ebird-llm-${{ env.TF_ENV }}" \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          APP_URL="http://$DNS"
          echo "App URL: $APP_URL"
          echo "## App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "$APP_URL" >> "$GITHUB_STEP_SUMMARY"
