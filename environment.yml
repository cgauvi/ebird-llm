name: ebird_llm_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # LangChain core and integrations
      - langchain>=1.0.0
      - langchain-core>=1.0.0
      - langchain-community>=0.4.0
      - langchain-huggingface>=0.1.0
      - langgraph>=0.2.0
      # HuggingFace runtime
      - huggingface-hub>=0.23.0
      - transformers>=4.40.0
      - torch --index-url https://download.pytorch.org/whl/cpu
      - torchvision --index-url https://download.pytorch.org/whl/cpu
      # Streamlit and UI
      - streamlit>=1.35.0
      - streamlit-folium>=0.20.0
      # Mapping
      - folium>=0.16.0
      # Charts
      - plotly>=5.20.0
      # Data handling
      - pandas>=2.2.0
      - statsmodels>=0.14.0
      # HTTP client
      - requests>=2.31.0
      # Config
      - python-dotenv>=1.0.0
      # Validation
      - pydantic>=2.7.0
